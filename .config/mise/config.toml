#:schema https://mise.jdx.dev/schema/mise.json

[settings]
auto_install = true
idiomatic_version_file_enable_tools = ["node", "ruby"]

[settings.ruby]
compile = false

[env]
HK_MISE = 1 # hk resolves tools via mise

[tools]
aube = "latest" # fast npm/yarn replacement; node stays mise-managed
hk = "latest" # git hooks
node = "lts"
pitchfork = "latest" # a CLI for managing daemons
python = "latest"
ruby = "latest"

"npm:hunkdiff" = "latest" # `hunk` diff viewer
"npm:@tobilu/qmd" = { version = "latest", npm_args = "--ignore-scripts=false" } # `qmd` doc search (needs postinstall for better-sqlite3)

[tasks.sync-agent-skills]
description = "Symlink bundled agent skills into ~/.claude/skills"
run = '''
command -v hunk >/dev/null || exit 0
mkdir -p ~/.claude/skills
ln -sfn "$(dirname "$(hunk skill path)")" ~/.claude/skills/hunk-review
'''

[hooks]
postinstall = [
  { run = "mise run sync-agent-skills" },
  { run = "hk install --global --mise" }, # install/update git hooks on tool install
]
