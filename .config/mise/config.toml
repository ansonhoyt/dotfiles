#:schema https://mise.jdx.dev/schema/mise.json

[settings]
auto_install = true
idiomatic_version_file_enable_tools = ["node", "ruby"]

[settings.ruby]
compile = false

[tools]
node = "lts"
python = "latest"
ruby = "latest"
"npm:hunkdiff" = "latest" # `hunk` diff viewer
"npm:@tobilu/qmd" = { version = "latest", npm_args = "--ignore-scripts=false" } # `qmd` doc search (needs postinstall for better-sqlite3)
