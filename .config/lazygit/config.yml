gui:
  nerdFontsVersion: "3"
  expandFocusedSidePanel: true
  filterMode: fuzzy
  showDivergenceFromBaseBranch: onlyArrow
  spinner:
    frames:
      - ⠋
      - ⠙
      - ⠹
      - ⠸
      - ⠼
      - ⠴
      - ⠦
      - ⠧
      - ⠇
      - ⠏
    rate: 80
keybinding:
  universal:
    # Revert v0.59 default (cmd+enter on Mac); lazygit doesn't decode kitty/CSI-u keys yet.
    # Remove once https://github.com/jesseduffield/lazygit/issues/3237 ships.
    confirmInEditor: [<alt+enter>, <ctrl+s>]
git:
  overrideGpg: true
  pagers:
    - pager: hunk pager --no-hunk-headers
    - pager: delta --dark --paging=never
