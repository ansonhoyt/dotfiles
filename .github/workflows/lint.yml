name: lint

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0  # gitleaks needs full history

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install shellcheck and stow
        run: sudo apt-get update && sudo apt-get install -y shellcheck stow

      - name: shellcheck
        # Discover shell files two ways: 
        # 1. known extensions/names
        # 2. bash shebang on the first line.
        run: |
          {
            git ls-files '*.sh' '.bashrc' '.bash_profile' '.osx'
            git ls-files | while read -r f; do
              head -1 "$f" 2>/dev/null | grep -qE '^#!.*\bbash\b' && echo "$f"
            done
          } | sort -u | xargs shellcheck

      - name: Download actionlint
        id: get_actionlint
        run: bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
        shell: bash
      - name: actionlint
        run: ${{ steps.get_actionlint.outputs.executable }} -color
        shell: bash

      - name: stow dry-run
        run: |
          mkdir -p /tmp/stow-target
          stow --no --verbose=2 --target=/tmp/stow-target .
