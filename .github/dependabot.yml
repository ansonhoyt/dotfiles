# https://docs.github.com/code-security/reference/supply-chain-security/dependabot-options-reference
# Cooldowns: https://blog.yossarian.net/2025/11/21/We-should-all-be-using-dependency-cooldowns
version: 2

updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
